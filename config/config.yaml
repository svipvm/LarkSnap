# LarkSnap Configuration

camera:
  device_index: 0
  width: 1280
  height: 720
  fps: 30
  capture_interval: 1.0
  retry_interval: 3.0  # seconds between camera open retries
  max_retries: 5  # max retry attempts before giving up

detector:
  type: seg
  confidence_threshold: 0.5
  target_classes:
    - person
  seg:
    model_path: models/seg-model.onnx
    img_size: 640
    iou_thres: 0.45
    max_det: 300
    provider: cpu  # cpu or cuda

notifier:
  type: feishu
  # Feishu app credentials (required)
  app_id: ""
  app_secret: ""
  # chat_id is auto-detected when you send the first command to the bot
  send_image: true
  message_template: "[LarkSnap] 检测到 {label}，置信度: {confidence:.2%}，时间: {timestamp}"
  retry:
    max_retries: 3
    retry_interval: 5

gateway:
  event_queue_size: 100
  notification_interval: 1  # seconds between same-label notifications to Feishu
  snapshot_dir: snapshots
  frame_queue_hwm: 30  # ZMQ high-water mark for frame queue
  frame_queue_policy: drop_oldest  # drop_oldest, drop_newest, or block

recorder:
  output_dir: recordings
  fps: 30.0
  codec: mp4v

service:
  name: LarkSnap
  display_name: LarkSnap Detection Service
  description: Gateway-controlled object detection system

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: logs/larksnap.log
  max_bytes: 10485760
  backup_count: 5
  console_output: true
