# LarkSnap Configuration Example
# Copy this file to config.yaml and fill in your values.

camera:
  type: opencv              # Camera adapter type (opencv)
  device_index: 0           # Camera device index (0 = default)
  width: 1280               # Capture resolution width
  height: 720               # Capture resolution height
  fps: 30                   # Target frame rate
  capture_interval: 1.0     # Seconds between frame captures
  retry_interval: 3.0       # Seconds between camera reconnect attempts
  max_retries: 5            # Max reconnect attempts before giving up

detector:
  type: seg                 # Detector adapter type (seg = instance segmentation)
  confidence_threshold: 0.5 # Minimum confidence to accept a detection
  target_classes:           # Only notify for these class names (COCO 80)
  - person                  # Multi-class supported — list as many
  - car                     # as you want to monitor. The same
  - dog                     # frame can produce several detections
                            # and they will be aggregated into a
                            # single Feishu notification. An empty
                            # list means "monitor nothing" (no
                            # notifications will be sent).
  seg:
    model_path: models/seg-model.onnx  # Path to ONNX segmentation model
    img_size: 640           # Model input image size
    iou_thres: 0.45         # NMS IoU threshold
    max_det: 300            # Max detections per frame
    provider: cpu           # Inference provider (cpu / cuda / coreml)

notifier:
  type: feishu              # Notifier adapter type (feishu)
  # Feishu app credentials (from https://open.feishu.cn/app)
  app_id: ""                # Your Feishu app ID
  app_secret: ""            # Your Feishu app secret
  send_image: true          # Send detection snapshot image with notification
  # The default message template aggregates multiple detections
  # in one frame into a single message. Available placeholders:
  #   {labels_summary} — "person (90%), car (78%)", sorted by confidence
  #   {labels_count}   — number of detections in this batch
  #   {labels}         — comma-separated list of labels (no confidences)
  #   {label}          — the top-confidence label (legacy single-class)
  #   {confidence}     — the top-confidence score (legacy single-class)
  #   {timestamp}      — formatted timestamp
  #   {snapshot_path}  — path to the saved snapshot image
  message_template: "[LarkSnap] 检测到 {labels_summary}（{labels_count} 个目标），时间: {timestamp}"
  retry:
    max_retries: 3          # Max retry attempts for API calls
    retry_interval: 5       # Seconds between retries
  # chat_id is auto-detected on first use (send /start to the bot in Feishu)
  # No need to fill this manually
  chat_id: ""

gateway:
  # ``notification_interval`` is kept as the legacy name for the
  # per-class save throttle. Internally it is mapped onto the
  # snapshot service's ``save_interval`` — the snapshot service
  # is the single source of truth for both the save cadence and
  # the notification cadence (the notification service no
  # longer throttles on its own). Adjusting this knob changes
  # both: a smaller value produces more frequent snapshots
  # AND more frequent Feishu messages, because notifications
  # fire only on the frames where the snapshot service
  # actually wrote a file. Default 30 s.
  notification_interval: 30 # Minimum seconds between saves/notifications per label
  snapshot_dir: snapshots   # Directory to save detection snapshots
  frame_queue_hwm: 30       # Frame queue high-water mark (max buffered frames)
  frame_queue_policy: drop_oldest  # Queue overflow policy (drop_oldest / drop_newest / block)

recorder:
  output_dir: recordings    # Directory to save video recordings
  fps: 30.0                 # Recording frame rate
  codec: mp4v               # Video codec (mp4v / xvid / h264)

service:
  name: LarkSnap
  display_name: LarkSnap Detection Service
  description: Gateway-controlled object detection system

logging:
  level: INFO               # Log level (DEBUG / INFO / WARNING / ERROR)
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: logs/larksnap.log
  max_bytes: 10485760       # Max log file size before rotation (10 MB)
  backup_count: 5           # Number of rotated log files to keep
  console_output: true      # Also print logs to console
